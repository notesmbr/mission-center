name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run tsc --if-present

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test --if-present

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:e2e --if-present

  playwright:
    name: playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:playwright --if-present

  ui-screenshot-required:
    name: ui-screenshot-required
    runs-on: ubuntu-latest
    steps:
      - name: Validate screenshot rule for UI PRs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '').toLowerCase();
            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            const uiHints = [
              'components/', 'app/', 'pages/', 'src/ui', 'src/components',
              '.css', '.scss', '.sass', '.tsx', '.jsx'
            ];

            const uiChanged = changedFiles.some(f => {
              const p = (f.filename || '').toLowerCase();
              return uiHints.some(h => p.includes(h));
            });

            if (!uiChanged) {
              core.info('No UI changes detected. Screenshot requirement not enforced.');
              return;
            }

            const hasScreenshot = body.includes('screenshot') || /!\[[^\]]*\]\([^\)]+\)/.test(pr.body || '');
            if (!hasScreenshot) {
              core.setFailed('UI changes detected but no screenshot found in PR description.');
            } else {
              core.info('UI screenshot requirement satisfied.');
            }
